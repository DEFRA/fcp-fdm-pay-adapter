name: fcp-fdm

services:
  fcp-fdm-pay-adapter:
    ports:
      - '3003:3003'
    networks:
      - fcp-fdm

  floci:
    ports:
      - '4566:4566'
    volumes:
      - floci-data:/app/data
    networks:
      - fcp-fdm

  floci-init:
    networks:
      - fcp-fdm

  service-bus:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator
    ports:
      - '5672:5672'
      - '5300:5300'
    networks:
      - fcp-fdm

  mssql:
    networks:
      - fcp-fdm

networks:
  fcp-fdm:
    driver: bridge
    name: fcp-fdm

volumes:
  floci-data:
